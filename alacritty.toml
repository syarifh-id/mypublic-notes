[general]
import = [
    "~/.config/alacritty/themes/themes/argonaut.toml"
]

[window]
opacity = 0.85
padding = { x = 12, y = 10 }
decorations = "none"
dimensions = { columns = 180, lines = 50 }

[font]
normal = { family = "JetBrains Mono", style = "Regular" }
bold = { family = "JetBrains Mono", style = "Bold" }
italic = { family = "JetBrains Mono", style = "Italic" }
size = 11.0

[env]
TERM = "xterm-256color"
COLORTERM = "truecolor"

[colors.selection]
text = "#fefefe" 
background = "#315891" 
